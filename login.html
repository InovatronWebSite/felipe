<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body style="display:flex; justify-content:center; align-items:center; height:100vh;">

    <div class="card-gold" style="width:300px; text-align:center;">
        <h2>🔐 Login</h2>

        <input type="text" id="email" placeholder="Email"><br><br>
        <input type="password" id="senha" placeholder="Senha"><br><br>

        <button class="btn-gold" onclick="login()">Entrar</button>

        <p>Não tem conta?</p>
        <button class="btn-outline" onclick="goRegister()">Cadastrar</button>
    </div>

    <script>


        async function login() {
            const email = document.getElementById('email').value
            const senha = document.getElementById('senha').value

            const res = await fetch("https://backend-production-30ee.up.railway.app/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ email, senha })
            })

            const data = await res.json()

            if (!data.success) {
                alert("Login inválido");
                return;
            }

            localStorage.setItem("loggedUser", JSON.stringify(data.user))
            window.location.href = "index.html"
        }
    </script>

</body>

</html>
